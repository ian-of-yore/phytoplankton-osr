[dataset]
path = {train_root}
split = 0.85, 0.15
external_test = {sykepic_test_root}
min_N =
max_N =
exclude =
random_seed = 42
oversample_until = 50
oversample_with_decay =

[model]
path = {model_out_dir}
network = resnet18
weights = DEFAULT
id = auto
exist_ok = no
head = 256, 128
dropout =

[image]
shape = 3, 180, 180
augmentations = flip, translate, zoom, brightness
imagenet_normalization = no
border = mode
zoom_range = 0.6, 1.4
brightness_range = 0.95, 1.1
max_rotation = 10
batch_size = 256
num_workers = 2

[train]
gpu = yes
max_epochs = 100
early_stop_patience = 12
learning_rate = 0.01
optimizer = Adam

[lr_warmup]
use = yes
factor_1 = 0.1
factor_2 = 0.5
step_1 = 4
step_2 = 14
step_3 = 24
verbose = yes

[lr_reduction]
use = yes
factor = 0.1
patience = 4
verbose = yes